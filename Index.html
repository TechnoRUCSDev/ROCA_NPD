<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>New Product Development System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1f6fb2;
  --primary-dark:#154d80;
  --primary-light:#e7f1fa;
  --primary-mid:#4a93c9;
  --accent:#f0a500;
  --danger:#e74c3c;
  --warn:#e67e22;
  --success:#27ae60;
  --purple:#7952b3;
  --text:#1a2530;
  --text-muted:#6b7c8c;
  --border:#d9e3ec;
  --bg:#f2f5f9;
  --white:#fff;
  --sidebar-w:230px;
  --topbar-h:56px;
}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);font-size:13px;height:100vh;overflow:hidden}

/* TOPBAR */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topbar-h);background:var(--primary-dark);display:flex;align-items:center;padding:0 20px;z-index:100;gap:12px}
.topbar-title{color:#fff;font-size:14px;font-weight:600;flex:1;text-align:center;letter-spacing:0.3px}
.topbar-user{display:flex;align-items:center;gap:8px;color:#fff;font-size:12px}
.topbar-avatar{width:30px;height:30px;border-radius:50%;background:var(--primary-mid);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;color:#fff;flex-shrink:0}
.role-chips{display:flex;gap:5px;flex-wrap:wrap;max-width:640px}
.role-chip{padding:4px 10px;border-radius:20px;background:rgba(255,255,255,0.13);color:#fff;font-size:10.5px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.22);transition:all 0.12s;white-space:nowrap}
.role-chip.active{background:#fff;color:var(--primary-dark)}
.role-chip:hover:not(.active){background:rgba(255,255,255,0.25)}
.brand-badge{background:#fff;border-radius:4px;padding:4px 10px;display:flex;gap:6px;align-items:center;flex-shrink:0}
.brand-badge b{color:var(--primary-dark);font-size:12px;font-weight:700}

/* SIDEBAR */
.sidebar{position:fixed;top:var(--topbar-h);left:0;bottom:0;width:var(--sidebar-w);background:var(--primary-dark);overflow-y:auto;z-index:90}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.nav-group-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;color:rgba(255,255,255,0.62);font-size:10.5px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;cursor:pointer;user-select:none;border-bottom:1px solid rgba(255,255,255,0.06)}
.nav-group-hdr:hover{background:rgba(255,255,255,0.04)}
.nav-group-hdr .chev{font-size:10px;opacity:0.6;transition:transform 0.2s}
.nav-group-hdr.open .chev{transform:rotate(180deg)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px 10px 28px;color:rgba(255,255,255,0.75);font-size:12px;font-weight:400;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.03);transition:all 0.12s;position:relative}
.nav-item:hover{background:rgba(255,255,255,0.07);color:#fff}
.nav-item.active{background:rgba(255,255,255,0.12);color:#fff;font-weight:500}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
.nav-item.primary-item{margin:10px 12px 4px 12px;background:var(--primary);border-radius:6px;padding:9px 12px;color:#fff;font-weight:600;justify-content:center;border-bottom:none}
.nav-item.primary-item:hover{background:var(--primary-mid)}
.nav-item .ni-icon{width:14px;height:10px;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.nav-item .ni-icon span{display:block;height:2px;background:currentColor;border-radius:1px}
.nav-item .ni-icon span:nth-child(2){width:80%}
.nav-item .ni-icon span:nth-child(3){width:60%}
.nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;min-width:18px;text-align:center}
.sidebar-foot{padding:12px 16px;font-size:10px;color:rgba(255,255,255,0.4);line-height:1.5}

/* MAIN */
.main{position:fixed;top:var(--topbar-h);left:var(--sidebar-w);right:0;bottom:0;overflow-y:auto;padding:20px}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* PAGE HEADER */
.page-hdr{margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:18px;font-weight:600;color:var(--primary-dark)}
.page-title span{font-size:12px;font-weight:400;color:var(--text-muted);margin-left:8px}
.breadcrumb{font-size:11px;color:var(--text-muted);margin-bottom:4px}
.breadcrumb b{color:var(--text)}
.more-info{font-size:11px;color:var(--primary);cursor:pointer;text-decoration:underline}

/* SECTION */
.sec{background:var(--white);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;overflow:hidden}
.sec-hdr{background:var(--primary);color:#fff;padding:10px 16px;font-size:12.5px;font-weight:600;display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;user-select:none}
.sec-hdr-left{display:flex;align-items:center;gap:8px}
.sec-hdr .sec-toggle{font-size:14px;opacity:0.85;width:14px;text-align:center}
.sec-hdr-actions{display:flex;gap:6px}
.sec-body{padding:16px}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 22px}
.form-grid.cols2{grid-template-columns:1fr 1fr}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:11px;font-weight:500;color:var(--text-muted)}
.form-label .req{color:var(--danger)}
.form-control{font-family:'Poppins',sans-serif;font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--white);color:var(--text);outline:none;transition:border 0.15s;width:100%}
.form-control:focus{border-color:var(--primary)}
.form-control.readonly{background:#f5f8fa;color:var(--text-muted);cursor:default}
select.form-control{cursor:pointer}

/* PRODUCT INFO SPREADSHEET TABLE */
.pi-scroll{overflow-x:auto;border:1px solid var(--border);border-radius:8px}
.pi-table{border-collapse:collapse;font-size:11px;min-width:2050px}
.pi-table thead th{background:#eef3f8;color:var(--primary-dark);padding:8px 8px;text-align:left;font-weight:600;white-space:nowrap;border-bottom:2px solid var(--border);border-right:1px solid var(--border);position:sticky;top:0}
.pi-table thead th.frozen,.pi-table tbody td.frozen{position:sticky;left:0;background:#fff;z-index:2;box-shadow:2px 0 4px rgba(0,0,0,0.04)}
.pi-table thead th:first-child{left:0;z-index:3}
.pi-table tbody td{padding:5px 6px;border-bottom:1px solid #edf1f5;border-right:1px solid #edf1f5;vertical-align:middle}
.pi-table tbody tr:hover td{background:#f8fafc}
.pi-table td input,.pi-table td select{font-family:'Poppins',sans-serif;font-size:11px;border:1px solid transparent;background:transparent;width:100%;min-width:110px;outline:none;color:var(--text);padding:5px 4px;border-radius:4px}
.pi-table td input:focus,.pi-table td select:focus{border-color:var(--primary);background:#fff}
.pi-table td.row-actions{display:flex;gap:4px;min-width:60px}
.row-icon-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.row-icon-btn:hover{background:var(--primary-light);color:var(--primary)}
.row-icon-btn.del:hover{background:#fde8e6;color:var(--danger);border-color:#f3c1bc}
.btn-add-row{background:var(--primary);color:#fff;border:none;border-radius:5px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn-add-row:hover{background:var(--primary-dark)}
.btn-import-row{background:#fff;color:var(--primary);border:1px solid var(--primary);border-radius:5px;padding:6px 14px;font-size:11px;font-weight:600;cursor:pointer}
.btn-import-row:hover{background:var(--primary-light)}
.scroll-hint{font-size:10.5px;color:var(--text-muted);display:flex;align-items:center;gap:5px;padding:6px 4px 0}

/* GENERIC TABLE (list screens) */
.tbl-wrap{overflow-x:auto}
table.list-tbl{width:100%;border-collapse:collapse;font-size:12px}
table.list-tbl thead th{background:var(--primary);color:#fff;padding:9px 12px;text-align:left;font-weight:500;white-space:nowrap;cursor:pointer}
table.list-tbl thead th:hover{background:var(--primary-dark)}
table.list-tbl tbody td{padding:9px 12px;border-bottom:1px solid #edf3f5;vertical-align:middle}
table.list-tbl tbody tr:hover td{background:#f7fafc}
table.list-tbl a.reqlink{color:var(--primary);font-weight:600;text-decoration:none;cursor:pointer}
table.list-tbl a.reqlink:hover{text-decoration:underline}

/* BUTTONS */
.btn{font-family:'Poppins',sans-serif;font-size:12px;font-weight:500;padding:9px 20px;border-radius:6px;cursor:pointer;border:none;transition:all 0.15s;letter-spacing:0.2px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{background:#1e8449}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#c0392b}
.btn-warn{background:var(--warn);color:#fff}
.btn-warn:hover{background:#ca6f1e}
.btn-outline{background:#fff;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{background:var(--bg)}
.btn-sap{background:var(--primary-dark);color:#fff}
.btn-sap:hover{background:#0f3a60}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-row{display:flex;gap:8px;justify-content:flex-end;padding-top:6px;flex-wrap:wrap;position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 40%);padding-bottom:6px;padding-top:16px}

/* LIST TOOLBAR */
.list-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.list-search{font-family:'Poppins',sans-serif;font-size:12px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;width:230px;outline:none}
.list-search:focus{border-color:var(--primary)}
.filter-select{font-family:'Poppins',sans-serif;font-size:11.5px;padding:7px 9px;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);background:#fff}
.show-entries{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)}
.show-entries select{font-family:'Poppins',sans-serif;font-size:12px;padding:4px 6px;border:1px solid var(--border);border-radius:4px}
.list-count{font-size:11px;color:var(--text-muted);margin-bottom:10px}
.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:12px;font-size:11.5px;color:var(--text-muted)}
.pagination .pg-btns{display:flex;gap:4px}
.pagination button{border:1px solid var(--border);background:#fff;border-radius:5px;padding:5px 10px;cursor:pointer;font-size:11.5px;color:var(--text)}
.pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pagination button:disabled{opacity:.35;cursor:default}

/* BADGES */
.badge{display:inline-block;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:0.2px;white-space:nowrap}
.badge-draft{background:#e2e6ea;color:#495057}
.badge-pending{background:#fef3cd;color:#7d4e00}
.badge-l1{background:#dbeafe;color:#154d80}
.badge-mis{background:#e7f1fa;color:#1f6fb2}
.badge-it{background:#ede4f7;color:#5b2d8e}
.badge-approved{background:#d4edda;color:#155724}
.badge-completed{background:#d4edda;color:#155724}
.badge-rejected{background:#f8d7da;color:#721c24}
.badge-rework{background:#ffe9d1;color:#7d4200}
.act-btn{font-family:'Poppins',sans-serif;font-size:10.5px;padding:5px 12px;border-radius:5px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--primary);margin-right:4px;font-weight:500;transition:all 0.12s;display:inline-flex;align-items:center;gap:4px}
.act-btn:hover{background:var(--primary-light)}
.act-btn.edit{color:#fff;border-color:var(--primary);background:var(--primary)}
.act-btn.edit:hover{background:var(--primary-dark)}

/* ATTACHMENTS / HISTORY */
.att-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #edf3f5;font-size:12px}
.att-row:last-child{border-bottom:none}
.att-file-name{font-size:11.5px;color:var(--primary);display:flex;align-items:center;gap:5px}
.history-item{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid #edf3f5}
.history-item:last-child{border-bottom:none}
.h-dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:5px}
.h-dot.green{background:var(--success)}
.h-dot.red{background:var(--danger)}
.h-dot.yellow{background:var(--warn)}
.h-action{font-size:12px;font-weight:600}
.h-meta{font-size:11px;color:var(--text-muted)}
.h-remark{font-size:11.5px;color:var(--text);margin-top:3px;font-style:italic;background:#f7f9fb;padding:6px 9px;border-radius:5px;border-left:2px solid var(--primary)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,15,25,0.5);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:10px;padding:22px;width:460px;max-width:95vw;box-shadow:0 10px 40px rgba(0,0,0,0.25);max-height:88vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:600;color:var(--primary-dark);margin-bottom:16px}
.modal textarea{font-family:'Poppins',sans-serif;font-size:12px;width:100%;padding:10px;border:1px solid var(--border);border-radius:6px;resize:vertical;min-height:80px;outline:none}
.modal textarea:focus{border-color:var(--primary)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal .form-group{margin-bottom:12px}

/* MISC */
.alert{padding:10px 14px;border-radius:6px;font-size:12px;margin-bottom:14px;display:flex;gap:8px;align-items:center}
.alert-info{background:#e7f1fa;color:#154d80;border:1px solid #bcd7ee}
.view-mode-badge{display:inline-flex;align-items:center;gap:5px;background:#e7f1fa;color:var(--primary-dark);font-size:11px;font-weight:500;padding:4px 11px;border-radius:20px;border:1px solid var(--border)}
.edit-mode-badge{display:inline-flex;align-items:center;gap:5px;background:#fff3cd;color:#7d4e00;font-size:11px;font-weight:500;padding:4px 11px;border-radius:20px;border:1px solid #ffc107}
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px 22px}
.info-item label{font-size:10.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px;font-weight:600}
.info-item p{font-size:13px;margin-top:2px;font-weight:500}
.toast-wrap{position:fixed;top:64px;right:16px;z-index:300;display:flex;flex-direction:column;gap:8px;width:300px}
.toast{background:#fff;border-left:4px solid var(--success);border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.15);padding:11px 14px;font-size:12px;font-weight:500;animation:slideIn .25s ease}
.toast.error{border-color:var(--danger)}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.hidden{display:none!important}
.fade-in{animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted)}
.chip-multi{display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--border);border-radius:6px;background:#fff;min-height:38px}
.chip{padding:4px 10px;border-radius:6px;font-size:10.5px;font-weight:600;background:#f1f4f7;color:var(--text-muted);border:1px solid var(--border);cursor:pointer}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand-badge"><b id="brandBadge">Roca · Parryware · Jaquar</b></div>
  <div class="topbar-title">New Product Development System</div>

    <div class="role-chips" id="roleChips"></div>
    <div class="topbar-user">

</div>

<div class="sidebar" id="sidebar"></div>
<div class="main" id="main"></div>
<div class="toast-wrap" id="toastWrap"></div>

<div class="modal-overlay hidden" id="modalOverlay">

  </div>
</div>

function buildHistory(req,createdAt){
  const h=[{stage:'Initiator',by:req.initiator,action:req.status==='Draft'?'Draft Created':'Submitted',date:createdAt,type:''}];
  const approverFor=(role)=>(APPROVER_CONFIG.find(a=>a.brand===req.brand&&a.role===role)||{}).user;
  let t=new Date(createdAt).getTime();
  const step=(by,action,type,remark)=>{t+=1000*60*60*20;h.push({by,action,date:new Date(t).toISOString(),type,remark})};
  if(req.status==='Rework'){ step(approverFor(req.reworkStage||'L1 - Vertical Head')||'Meera Subramaniam','Sent for Rework','yellow',req.reworkRemark||'Please review pricing details and resubmit.'); return h; }
  if(req.status==='Rejected'){ step(approverFor('L1 - Vertical Head')||'Meera Subramaniam','Rejected','red','Duplicate SKU already exists in the active catalog.'); return h; }
  const order=['Submitted','L1 Approved','MIS Approved','Completed'];
  const idx=order.indexOf(req.status);
  if(idx>=0) step(approverFor('L1 - Vertical Head')||'Meera Subramaniam','Approved','green','Looks good, forwarding to MIS Coordinator.');
  if(idx>=1) step(approverFor('MIS Coordinator')||'Divya Nair','Approved','green','Master data verified, forwarding to IT.');
  if(idx>=2) step('Suresh Kumar', req.itInfo?'Posted to SAP':'Reviewing','green', req.itInfo?`Material posted successfully. SAP Ref: ${req.sapDoc}`:'');
  return h;
}

let LIST_STATE={}, LIST_REGISTRY={};
function ensureListState(key){ if(!LIST_STATE[key]) LIST_STATE[key]={q:'',page:1,sort:null,dir:1,filters:{}}; return LIST_STATE[key]; }

function listPageHTML(key, rows, columns, opts){
  opts=opts||{};
  LIST_REGISTRY[key]={rows,columns,opts};
  const st=ensureListState(key);
  const filters=opts.filters||[];
  let h=`<div class="list-toolbar">
    <input class="list-search" placeholder="Search ${opts.searchPlaceholder||'requests'}..." value="${esc(st.q)}" oninput="LIST_STATE['${key}'].q=this.value;LIST_STATE['${key}'].page=1;updateList('${key}')"/>
    ${filters.map(f=>`<select class="filter-select" onchange="LIST_STATE['${key}'].filters['${f.key}']=this.value;LIST_STATE['${key}'].page=1;updateList('${key}')">
      <option value="">${f.label}: All</option>
      ${f.options.map(o=>`<option value="${esc(o)}" ${st.filters[f.key]===o?'selected':''}>${esc(o)}</option>`).join('')}
    </select>`).join('')}
    <div style="flex:1"></div>
    <button class="act-btn" onclick="exportList('${key}','csv')">&#8681; Export CSV</button>
    <button class="act-btn" onclick="exportList('${key}','xlsx')">&#8681; Export Excel</button>
  </div>
  <div id="lb-${key}"></div>`;
  setTimeout(()=>updateList(key),0);
  return h;
}
function computeFiltered(key){
  const {rows,columns,opts}=LIST_REGISTRY[key];
  const st=ensureListState(key);
  let r=rows;
  if(st.q.trim()){
    const ql=st.q.toLowerCase();
    const keys=opts.searchKeys||[];
    r=r.filter(row=>keys.some(k=>String(row[k]??'').toLowerCase().includes(ql)));
  }
  (opts.filters||[]).forEach(f=>{
    const v=st.filters[f.key];
    if(v) r=r.filter(row=>String(f.accessor?f.accessor(row):row[f.key])===v);
  });
  if(st.sort){
    r=[...r].sort((a,b)=>{
      const av=a[st.sort]??'', bv=b[st.sort]??'';
      return av<bv?-1*st.dir:av>bv?1*st.dir:0;
    });
  }
  return r;
}
function updateList(key){
  const {columns,opts}=LIST_REGISTRY[key];
  const st=ensureListState(key);
  const filtered=computeFiltered(key);
  const pageSize=opts.pageSize||8;
  const totalPages=Math.max(1,Math.ceil(filtered.length/pageSize));
  if(st.page>totalPages) st.page=totalPages;
  const pageRows=filtered.slice((st.page-1)*pageSize, st.page*pageSize);
  let h=`<div class="tbl-wrap"><table class="list-tbl"><thead><tr>`;
  columns.forEach(c=>{
    h+=`<th ${c.sortable?`onclick="LIST_STATE['${key}'].sort='${c.key}';LIST_STATE['${key}'].dir=(LIST_STATE['${key}'].sort==='${c.key}'?-LIST_STATE['${key}'].dir:1);updateList('${key}')"`:''}>${c.header}${c.sortable&&st.sort===c.key?(st.dir===1?' &#9662;':' &#9652;'):''}</th>`;
  });
  h+=`</tr></thead><tbody>`;
  if(pageRows.length===0){
    h+=`<tr><td colspan="${columns.length}"><div class="empty-state">${opts.emptyText||'No records found.'}</div></td></tr>`;
  }
  pageRows.forEach(row=>{
    h+=`<tr>${columns.map(c=>`<td>${c.render?c.render(row):esc(row[c.key])}</td>`).join('')}</tr>`;
  });
  h+=`</tbody></table></div>`;
  h+=`<div class="pagination"><span>Showing ${filtered.length===0?0:(st.page-1)*pageSize+1}&ndash;${Math.min(st.page*pageSize,filtered.length)} of ${filtered.length} entries</span>
  <div class="pg-btns">
    <button onclick="LIST_STATE['${key}'].page=Math.max(1,LIST_STATE['${key}'].page-1);updateList('${key}')" ${st.page===1?'disabled':''}>&lsaquo; Prev</button>
    <button class="active">${st.page} / ${totalPages}</button>
    <button onclick="LIST_STATE['${key}'].page=Math.min(${totalPages},LIST_STATE['${key}'].page+1);updateList('${key}')" ${st.page===totalPages?'disabled':''}>Next &rsaquo;</button>
  </div></div>`;
  document.getElementById('lb-'+key).innerHTML=h;
}
function exportList(key,fmt){
  const {columns}=LIST_REGISTRY[key];
  const filtered=computeFiltered(key);
  const header=columns.map(c=>`"${c.header}"`).join(',');
  const lines=filtered.map(row=>columns.map(c=>{
    const v=c.csv?c.csv(row):(row[c.key]??'');
    return `"${String(v).replace(/<[^>]*>/g,'').replace(/"/g,'""')}"`;
  }).join(','));
  const csv=[header,...lines].join('\n');
  const blob=new Blob([csv],{type:fmt==='xlsx'?'application/vnd.ms-excel':'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`${key}-export.${fmt==='xlsx'?'xls':'csv'}`; document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast(`Exported ${filtered.length} record(s) to ${fmt.toUpperCase()}`);
}

  if(!validateProducts()){ toast('Please complete Material Description, Sub Category and Category for every product row.','error'); return; }
  openModal('submit-form',null,{title:'Submit Request?',msg:'This request will be submitted to the L1 Vertical Head for approval. You will not be able to edit it until it is returned.',btnLabel:'Submit',btnClass:'btn-primary',noRemark:true});

function doSaveDraftOrSubmit(kind){
  if(editingId){
    const r=requests.find(x=>x.id===editingId);
    Object.assign(r,{brand:formGeneral.brand,materialType:formGeneral.materialType,plantSource:formGeneral.plantSource,products:formProducts.map(p=>Object.assign({},p))});
    if(kind==='submit'){ r.status='Submitted'; r.history.push({by:USERS['Initiator'].name,action:'Resubmitted',date:new Date().toISOString(),type:'',remark:''}); }
    else { r.status='Draft'; }
  } else {
    const id=nextReqId(formGeneral.brand);
    const createdAt=new Date().toISOString();
    const status=kind==='submit'?'Submitted':'Draft';
    const r={id,createdAt,brand:formGeneral.brand,materialType:formGeneral.materialType,plantSource:formGeneral.plantSource,
      initiator:USERS['Initiator'].name,status,products:formProducts.map(p=>Object.assign({},p)),
      attachments:[],history:[{by:USERS['Initiator'].name,action:kind==='submit'?'Submitted':'Draft Created',date:createdAt,type:'',remark:''}]};
    requests.unshift(r);
  }
  toast(kind==='submit'?'Request submitted to L1 Vertical Head successfully.':'Request saved as draft.');
  navigate(kind==='submit'?'all-requests':'drafts-rework');
}
// ── MODAL ENGINE ──────────────────────────────────────────────────────────────
function openModal(action,targetId,opts){
  modalAction=action; modalTargetId=targetId;
  document.getElementById('modalTitle').textContent=opts.title;
  document.getElementById('modalFormArea').innerHTML=opts.msg?`<p style="font-size:12.5px;color:var(--text-muted);margin-bottom:${opts.noRemark?'0':'12px'}">${opts.msg}</p>`:'';
  const ta=document.getElementById('modalRemarks');
  if(opts.noRemark){ ta.style.display='none'; ta.value=''; } else { ta.style.display='block'; ta.value=''; ta.placeholder=opts.remarkPlaceholder||'Enter your remarks / comments here...'; }
  const btn=document.getElementById('modalConfirmBtn');
  btn.className='btn '+(opts.btnClass||'btn-primary');
  btn.textContent=opts.btnLabel||'Confirm';
  document.getElementById('modalOverlay').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.add('hidden');
  document.getElementById('modalFormArea').innerHTML='';
  modalAction=null; modalTargetId=null;
}
function confirmModal(){
  const ta=document.getElementById('modalRemarks');
  const remarkShown=ta.style.display!=='none';
  const remark=ta.value.trim();
  if(remarkShown && !remark && modalAction!=='review-only'){ toast('Comments are mandatory for this action.','error'); return; }
  const action=modalAction, id=modalTargetId;
  closeModal();
  if(action==='cancel-form'){ navigate(editingId?'drafts-rework':'all-requests'); return; }
  if(action==='save-draft'){ doSaveDraftOrSubmit('draft'); return; }
  if(action==='submit-form'){ doSaveDraftOrSubmit('submit'); return; }
  if(action==='approve') return doApprove(id, remark);
  if(action==='rework') return doRework(id, remark);
  if(action==='reject') return doReject(id, remark);
  if(action==='post-sap') return doPostToSAP(id, remark);
  if(action==='save-lookup-type') return saveLookupType(id);
  if(action==='save-lookup') return saveLookup(id);
  if(action==='save-role') return saveRole(id);
  if(action==='save-approver') return saveApprover(id);
  if(action==='save-workflow') return saveWorkflow(id);
  if(action==='save-plant') return savePlant(id);
}

const NEXT_STAGE={'L1 - Vertical Head':{status:'L1 Approved',forward:'MIS Coordinator'},'MIS Coordinator':{status:'MIS Approved',forward:'IT'}};
function doApprove(id,remark){
  const r=requests.find(x=>x.id===id); if(!r) return;
  const cfg=NEXT_STAGE[currentRole];
  r.status=cfg.status;
  r.history.push({by:USERS[currentRole].name,action:'Approved',date:new Date().toISOString(),type:'green',remark});
  toast(`${id} approved and forwarded to ${cfg.forward}.`);
  navigate('pending-requests');
}
function doRework(id,remark){
  const r=requests.find(x=>x.id===id); if(!r) return;
  r.status='Rework'; r.reworkStage=currentRole; r.reworkRemark=remark;
  r.history.push({by:USERS[currentRole].name,action:'Sent for Rework',date:new Date().toISOString(),type:'yellow',remark});
  toast(`${id} returned to Initiator for rework.`);
  navigate('pending-requests');
}
function doReject(id,remark){
  const r=requests.find(x=>x.id===id); if(!r) return;
  r.status='Rejected';
  r.history.push({by:USERS[currentRole].name,action:'Rejected',date:new Date().toISOString(),type:'red',remark});
  toast(`${id} has been rejected.`,'error');
  navigate('pending-requests');
}
function doPostToSAP(id,remark){
  const r=requests.find(x=>x.id===id); if(!r) return;
  const draft=itDraftCache[id];
  if(!validateITFields(draft)){ toast('Please complete all mandatory IT fields before posting to SAP.','error'); return; }
  r.itInfo=draft; delete itDraftCache[id];
  r.sapDoc='49'+Math.floor(10000000+Math.random()*89999999);
  r.status='Completed';
  r.history.push({by:USERS.IT.name,action:'Posted to SAP',date:new Date().toISOString(),type:'green',remark:remark||`Material posted successfully. SAP Ref: ${r.sapDoc}`});
  toast(`${id} posted to SAP successfully. Material Doc: ${r.sapDoc}`);
  navigate('pending-requests');
}

  return f.plantCode && f.basicMaterial && f.taxClassification && f.profitCenter && f.classNumber;

  const cols=[
    {key:'id',header:'Request ID',sortable:true},
    {key:'productName',header:'Product Name',render:r=>esc((r.products[0]||{}).materialDescription)},
    {key:'brand',header:'Brand',sortable:true},
    {key:'plantSource',header:'Plant/Source'},
    {key:'initiator',header:'Initiator',sortable:true},
    {key:'currentRole',header:'Current Role',render:r=>STAGE_LABEL[r.status]||'-'},
    {key:'status',header:'Workflow Status',sortable:true,render:r=>badge(r.status)},
    {key:'createdAt',header:'Date',sortable:true,render:r=>fmtDate(r.createdAt)},
  ];
  return `${breadcrumb('Export Product Reports')}<div class="page-hdr"><div class="page-title">Export Product Reports</div></div>
  <div class="sec"><div class="sec-body">
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Product Name</label><input class="form-control" id="rf1" placeholder="Search by product name"/></div>
    <div class="form-group"><label class="form-label">Request ID</label><input class="form-control" id="rf2" placeholder="e.g. ROC-2026-01045"/></div>
    <div class="form-group"><label class="form-label">Brand</label><select class="form-control" id="rf3"><option value="">All</option>${BRANDS.map(b=>`<option>${b}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Plant</label><select class="form-control" id="rf4"><option value="">All</option>${PLANT_MASTER.map(p=>`<option>${p.code}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Initiator</label><input class="form-control" id="rf5" placeholder="Initiator name"/></div>
    <div class="form-group"><label class="form-label">Workflow Status</label><select class="form-control" id="rf6"><option value="">All</option>${['Draft','Submitted','L1 Approved','MIS Approved','Completed','Rework','Rejected'].map(s=>`<option>${s}</option>`).join('')}</select></div>
    <div class="form-group"><label class="form-label">Date From</label><input class="form-control" id="rf7" type="date"/></div>
    <div class="form-group"><label class="form-label">Date To</label><input class="form-control" id="rf8" type="date"/></div>
  </div>
  <div class="btn-row" style="justify-content:flex-start;position:static;background:none">
    <button class="btn btn-primary btn-sm" onclick="applyReportFilters()">Search</button>
    <button class="btn btn-outline btn-sm" onclick="resetReportFilters()">Reset</button>
  </div>
  </div></div>
  ${listPageHTML('reports', rows, cols, {searchKeys:['id','initiator','brand'], pageSize:10})}`;
}
const STAGE_LABEL={'Draft':'Initiator','Submitted':'L1 - Vertical Head','L1 Approved':'MIS Coordinator','MIS Approved':'IT','Completed':'Marketing Finance','Rework':'Initiator','Rejected':'Closed'};
function applyReportFilters(){
  const st=ensureListState('reports');
  const name=document.getElementById('rf1').value.toLowerCase();
  const rid=document.getElementById('rf2').value.toLowerCase();
  const brand=document.getElementById('rf3').value;
  const status=document.getElementById('rf6').value;
  let rows=reportsScopedRequests();
  if(name) rows=rows.filter(r=>(r.products[0]||{}).materialDescription?.toLowerCase().includes(name));
  if(rid) rows=rows.filter(r=>r.id.toLowerCase().includes(rid));
  if(brand) rows=rows.filter(r=>r.brand===brand);
  if(status) rows=rows.filter(r=>r.status===status);
  LIST_REGISTRY['reports'].rows=rows;
  st.page=1;
  updateList('reports');
  toast(`Filtered report: ${rows.length} record(s) found.`);
}
function resetReportFilters(){ navigate('reports'); }

// ── RENDER MAIN DISPATCHER ────────────────────────────────────────────────────
function renderMain(){
  const el=document.getElementById('main');
  el.className='main fade-in';
  let html='';
  if(activePage==='request-detail'){ html=requestDetailPage(); }
  else if(activePage==='request-review'){ html=requestReviewPage(); }
  else if(currentRole==='Admin'){
    const map={'all-requests':pageAdminAll,'lookup-type':pageLookupType,'lookup':pageLookup,'role-master':pageRoleMaster,
      'approver-config':pageApproverConfig,'workflow-config':pageWorkflowConfig,'plant-mapping':pagePlantMapping,'reports':pageReports};
    html=(map[activePage]||pageAdminAll)();
  } else if(currentRole==='Initiator'){
    const map={'new-request':pageNewRequest,'all-requests':pageInitiatorAll,'pending-requests':pageInitiatorPending,'drafts-rework':pageInitiatorDrafts,'reports':pageReports};
    if(activePage==='new-request' && !editingId && formProducts.length===1 && !formProducts[0].materialDescription && !formGeneral.brand){ /* keep as-is, already fresh */ }
    html=(map[activePage]||pageInitiatorAll)();
  } else if(currentRole==='Marketing Finance'){
    const map={'all-requests':pageFinanceAll,'reports':pageReports};
    html=(map[activePage]||pageFinanceAll)();
  } else { // L1 / MIS / IT
    const map={'all-requests':()=>pageApproverAll(currentRole),'pending-requests':()=>pageApproverPending(currentRole),'approved-requests':()=>pageApproverApproved(currentRole),'reports':pageReports};
    html=(map[activePage]||(()=>pageApproverAll(currentRole)))();
  }
  el.innerHTML=html;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
initRoleChips();
switchRole('Initiator');
</script>
</body>
</html>
